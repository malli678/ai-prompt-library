version: '3.9'

services:

  db:
    image: postgres:14-alpine
    container_name: prompt_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - prompt_net

  redis:
    image: redis:7-alpine
    container_name: prompt_redis
    restart: unless-stopped
    networks:
      - prompt_net

  backend:
    build: ./backend
    container_name: prompt_backend
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8000:8000"
    networks:
      - prompt_net

  frontend:
    build: ./frontend
    container_name: prompt_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:4200"
    networks:
      - prompt_net

networks:
  prompt_net:
    driver: bridge

volumes:
  postgres_data:
